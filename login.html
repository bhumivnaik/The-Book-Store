<!DOCTYPE html>
<html>
<head>
    <title>The Book Store | Login</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body class="auth-body">

<!-- HEADER -->
<header class="header">

    <div class="logo">The Book Store</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="categories.html">Categories</a>
        <a href="cart.html">Cart</a>
        <a href="about.html">About Us</a>
    </nav>

</header>


<!-- LOGIN CONTAINER -->
<div class="auth-container">

    <div class="auth-box">

        <h2>The Book Store</h2>
        <p class="tagline">Where Stories Begin ✨</p>

        <div class="toggle-buttons">
            <button id="loginBtn" onclick="showLogin()">Login</button>
            <button id="signupBtn" onclick="showSignup()">Sign Up</button>
        </div>

        <!-- Login -->
        <form id="login-form" class="form">

            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>

            <button type="submit" class="auth-btn">Login</button>

        </form>

        <!-- Signup -->
        <form id="signup-form" class="form hidden">

            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>

            <button type="submit" class="auth-btn">Create Account</button>

        </form>

    </div>

</div>


<script>

function showLogin(){
    document.getElementById("login-form").classList.remove("hidden");
    document.getElementById("signup-form").classList.add("hidden");
}

function showSignup(){
    document.getElementById("signup-form").classList.remove("hidden");
    document.getElementById("login-form").classList.add("hidden");
}

</script>

</body>
</html>
