<!DOCTYPE html>
<html>

<head>
    <title>BookEssence | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!--<link rel="stylesheet" href="style.css">-->
    <script src="../style.js"></script>
    <link rel="stylesheet" href="../allstyle.css">
    <style>
        /* login.html */
        .auth-section {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px 20px;
        }

        .auth-card {
            width: 400px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .auth-card input[type="radio"] {
            display: none;
        }

        .auth-tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
        }

        .auth-tabs label {
            cursor: pointer;
            font-weight: 600;
            padding-bottom: 5px;
            border-bottom: 2px solid transparent;
            transition: 0.3s;
        }

        #login:checked~.auth-tabs label[for="login"],
        #signup:checked~.auth-tabs label[for="signup"] {
            border-color: #b08968;
            color: #b08968;
        }

        .forms-container .form {
            display: none;
        }

        #login:checked~.forms-container .login-form {
            display: block;
        }

        #signup:checked~.forms-container .signup-form {
            display: block;
        }

        .form input {
            width: 93%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .form button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: var(--textp);
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .form button:hover {
            background: #7f5539;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body class="auth-body">
    <header>
        <div class="logo">Book<h1 id="sec">Essence</h1>
        </div>
        <div class="menu-icon" onclick="toggleMenu()">
            <i class="fa-solid fa-bars"></i>
        </div>
        <nav id="navLinks">
            <a href="../1home/index.html">Home</a>
            <a href="../3categories/categories.html">Categories</a>
            <a href="../5about/about.html">About Us</a>
            <a href="../4cart/cart.html"><i class="fa-solid fa-cart-shopping"></i></a>
            <button class="login-btn" onclick="location.href='login.html'">Login</button>
        </nav>
    </header>

    <section class="auth-section">

        <div class="auth-card">

            <!-- Hidden Radio Buttons -->
            <input type="radio" name="auth-toggle" id="login" checked>
            <input type="radio" name="auth-toggle" id="signup">

            <!-- Toggle Buttons -->
            <div class="auth-tabs">
                <label for="login">Login</label>
                <label for="signup">Sign Up</label>
            </div>

            <!-- Forms -->
            <div class="forms-container">

                <!-- Login Form -->
                <div class="form login-form">
                    <h2>Welcome Back</h2>
                    <p>Sign in to continue your reading journey.</p>

                    <input type="email" placeholder="Email Address" required>
                    <input type="password" placeholder="Password" required>
                    <button id="loginBtn">Login</button>
                </div>

                <!-- Signup Form -->
                <div class="form signup-form">
                    <h2>Create Account</h2>
                    <p>Join BookEssence and explore thousands of books.</p>

                    <input type="text" placeholder="Full Name" required>
                    <input type="email" placeholder="Email Address" required>
                    <input type="password" placeholder="Password" required>
                    <button>Sign Up</button>
                </div>

            </div>

        </div>

    </section>
    <script>
        /* ================= SIGNUP ================= */
        const signupBtn = document.querySelector(".signup-form button");

        signupBtn.addEventListener("click", function () {
            const name = document.querySelector(".signup-form input[type='text']").value;
            const email = document.querySelector(".signup-form input[type='email']").value;
            const password = document.querySelector(".signup-form input[type='password']").value;

            if (!name || !email || !password) {
                alert("Please fill all fields");
                return;
            }

            let users = JSON.parse(localStorage.getItem("users")) || [];

            const exists = users.find(user => user.email === email);

            if (exists) {
                alert("User already exists! Please login.");
                return;
            }

            const newUser = { name, email, password };

            users.push(newUser);
            localStorage.setItem("users", JSON.stringify(users));

            // store logged-in user
            localStorage.setItem("user", JSON.stringify(newUser));

            alert("Signup successful!");

            // redirect to home
            window.location.href = "../1home/index.html";
        });


        /* ================= LOGIN ================= */
        const loginBtn = document.getElementById("loginBtn");

        loginBtn.addEventListener("click", function () {

            const email = document.querySelector(".login-form input[type='email']").value;
            const password = document.querySelector(".login-form input[type='password']").value;

            if (!email || !password) {
                alert("Please enter email and password");
                return;
            }

            let users = JSON.parse(localStorage.getItem("users")) || [];

            const validUser = users.find(user =>
                user.email === email && user.password === password
            );

            if (!validUser) {
                alert("Invalid email or password");
                return;
            }

            // store logged-in user
            localStorage.setItem("user", JSON.stringify(validUser));

            alert("Login successful!");

            // redirect to home
            window.location.href = "../1home/index.html";
        });
    </script>
